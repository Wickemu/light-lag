name: CI

# Run the same checks we run by hand — typecheck, tests, build — on every push
# and pull request, so a broken change shows up before it's merged.
on:
  push:
    branches: [main]
  pull_request:

# When new commits land on a branch, cancel any CI run still in flight for it
# so a fixup push doesn't leave two builds racing. main runs aren't cancelled.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
