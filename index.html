<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LIGHTLAG — a physics-true Solar System</title>
    <!-- Inline favicon: a small sun on a deep-space disc (no extra request / no 404). -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%2305070d'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23ffd66b'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%234fd1e0' stroke-width='1.2' opacity='0.7'/%3E%3C/svg%3E"
    />

    <!-- Apply the saved theme + accent palette before first paint to avoid a
         flash of the defaults. -->
    <script>
      try {
        var t = localStorage.getItem("lightlag.theme");
        if (t === "light" || t === "dark")
          document.documentElement.setAttribute("data-theme", t);
        var a = localStorage.getItem("lightlag.accent");
        if (a) document.documentElement.setAttribute("data-accent", a);
      } catch (e) {}
    </script>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="ui-root"></div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
